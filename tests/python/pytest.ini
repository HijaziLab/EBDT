[pytest]
# Carpeta donde buscar tests (relativo a este archivo)
testpaths = .

# Marcadores personalizados
markers =
    slow: tests lentos que ejecutan el pipeline completo con datos reales
          (excluir con: pytest -m "not slow")

# Mostrar warnings del código (útil para detectar el 'is not 0' de Python)
filterwarnings =
    default
